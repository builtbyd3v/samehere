name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # TODO: make blocking once existing lint errors are triaged (see plans/019)
      - run: npm run lint
        continue-on-error: true
      - run: npx tsc --noEmit
      - run: npm test
